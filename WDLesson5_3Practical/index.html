<!DOCTYPE html>
<html>
  <head>

  <body>
    <script src="script.js"></script>
    <div class="container" id="banner">
      <h1>Compound Interest Calculator</h1>

        <img src="compound-interest-formula-diagram.png" width="100%"><br>

        <input type="button" value="Calculate" onclick="balance()"><br>
      </div>
      <div class="card">
        <div id="output" class="container center"></div>
